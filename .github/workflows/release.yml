# Builds the Windows NSIS installer and attaches it to a draft GitHub Release
# whenever a version tag (v*) is pushed. Publish the draft by hand after a
# quick sanity check of the attached artifacts.
name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "EXFIL ${{ github.ref_name }}"
          releaseBody: "See the commit history for what changed. Heads-up: the installer is unsigned — expect a SmartScreen prompt (More info → Run anyway)."
          releaseDraft: true
          prerelease: false
